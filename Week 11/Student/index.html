<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Magazine Layout (CSS Grid)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
        <!-- ให้นักเรียนแบ่งพื้นที่หน้าจอแบ่งเป็นตารางนิตยสาร ซ้ายเป็นรูป ขวาเป็นเนื้อหาบทความด้วย Grid -->
        <div class="header">นิตยสารไอที ม.5</div>
        <div class="photo"><img src="https://picsum.photos/400/400?random=20" alt="News Image" /></div>
        <div class="article">
            <h2>การเปลี่ยนแปลงทางเทคโนโลยีในปี 2026</h2>
            <p>การพัฒนาของปัญญาประดิษฐ์และโปรแกรมมิ่งเว็บก้าวหน้าอย่างรวดเร็ว ทำให้นักพัฒนารุ่นใหม่จำเป็นต้องเรียนรู้ทักษะการดีไซน์และเขียนโค้ดอย่างมีระดับ...</p>
        </div>
        <div class="footer">ลิขสิทธิ์เฉพาะนิตยสารเพลินพัฒนา</div>
    </div>
</body>
</html>
