<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Magazine Layout (Grid)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
        <header class="header">นิตยสารเว็บ</header>
        <div class="main-art">
            <img src="https://picsum.photos/600/400?random=10" alt="Main Article">

            <p>เนื้อหาข่าวแบบละเอียด...</p>
        </div>
        <div class="sidebar">
            <h3>ข่าวอื่นๆ</h3>
            <ul>
                <li>ข่าวสั้น 1</li>
                <li>ข่าวสั้น 2</li>
                <li>ข่าวสั้น 3</li>
            </ul>
        </div>
        <div class="extra">โฆษณา / พื้นที่เพิ่มเติม</div>
        <footer class="footer">© 2026 Magazine</footer>
    </div>
</body>
</html>
