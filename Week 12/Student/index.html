<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Landing Page (Draft)</title>
    <!-- Bootstrap CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- ให้นักเรียนฝึกใช้งานคลาส Grid ของ Bootstrap (.container, .row, .col-*) -->
    <div class="container text-center mt-5">
        <h1>หน้าสินค้าของฉัน (Draft)</h1>
        <p class="text-muted">แบ่งคอลัมน์แสดงรูปภาพและข้อความคำบรรยายเพื่อลองเล่นกับระบบ Responsive Grid</p>
        
        <div class="row mt-4">
            <div class="col-md-6 border p-4 bg-light">
                <h3>รูปภาพสินค้า</h3>
                <img src="https://picsum.photos/300/200?random=31" class="img-fluid rounded" alt="Product Draft" />
            </div>
            <div class="col-md-6 border p-4 bg-light">
                <h3>รายละเอียดสินค้า</h3>
                <p>รายละเอียดการร่างเลย์เอาต์ระบบแบ่งคอลัมน์ของ Bootstrap Framework</p>
            </div>
        </div>
    </div>
</body>
</html>
