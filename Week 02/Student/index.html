<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าชมรม E-Sports</title>
    <!-- [โจทย์เสริมพิเศษ 10] นักเรียนสามารถเปิดแท็ก <style> ตรงนี้เพื่อตกแต่ง CSS ให้แบบฟอร์มดูสวยงามล้ำสมัยได้เลย! -->
</head>
<body>

    <!-- [โจทย์หลัก 1] พิมพ์หัวข้อเรื่องชมรมด้วยแท็ก <h1> และคำอธิบายด้วยแท็ก <p> ด้านล่างบรรทัดนี้ -->


    <!-- [โจทย์หลัก 2] สร้างแท็กครอบฟอร์มด้วย <form action="#" method="POST"> สำหรับจัดส่งข้อมูล -->


        <!-- [โจทย์หลัก 3] เพิ่มช่องกรอกข้อมูลส่วนบุคคล:
             - ชื่อ-นามสกุล (ใช้ <input type="text">)
             - อีเมล (ใช้ <input type="email">)
             - รหัสผ่าน (ใช้ <input type="password">)
             *ข้อสำคัญ*: อย่าลืมพิมพ์แท็ก <label> สำหรับแต่ละช่อง และทำการเชื่อมคู่ฉลากกับช่องกรอกด้วย id และ for ให้ตรงกันทุกตัวอักษร!
        -->


        <!-- [โจทย์หลัก 4] เพิ่มช่องตัวเลือกห้องเรียนดึงลงมา (Dropdown Menu) โดยสร้างแท็กหลักคือ <select>
             และครอบตุ๊กตาตัวเลือกด้านในด้วยแท็ก <option> (มีตัวเลือกสำหรับ ม.5/1 ถึง ม.5/4)
        -->


        <!-- [โจทย์เสริมพิเศษ 6] เพิ่มปุ่มเลือกแบบวิทยุ (Radio Buttons - เลือกได้ข้อเดียว) สำหรับแพลตฟอร์มหลักที่ใช้เล่นเกม:
             - ตัวเลือก PC, Console, Mobile (ใช้ <input type="radio">)
             *เคล็ดลับ*: จะต้องตั้งแอตทริบิวต์ name="..." ให้มีชื่อเดียวกันทั้งหมดเพื่อให้ระบบจัดกลุ่มให้เลือกได้เพียงตัวเลือกเดียว!
        -->


        <!-- [โจทย์เสริมพิเศษ 7] เพิ่มช่องติ๊กเลือกประเภทเกมที่สนใจเข้าแข่ง (Checkboxes - เลือกได้หลายข้อ):
             - ตัวเลือก MOBA, FPS, Sports (ใช้ <input type="checkbox">)
        -->


        <!-- [โจทย์เสริมพิเศษ 8] เพิ่มกล่องข้อความบรรยายขนาดใหญ่ยาวหลายบรรทัด สำหรับแนะนำตัวเองหรือระบุระดับแรงก์เกม (ใช้แท็ก <textarea>) -->


        <!-- [โจทย์เสริมพิเศษ 9] เพิ่มความโปรดึกขึ้นด้วยการเสริมพลัง:
             - ใส่แอตทริบิวต์ placeholder="..." ในช่องกรอกเพื่อเป็นตัวอย่างคำใบ้
             - ใส่แอตทริบิวต์ required ในช่องกรอกและปุ่มที่จำเป็นเพื่อบังคับให้ผู้กรอกกรอกข้อมูลก่อนกดส่งฟอร์ม
        -->


        <!-- [โจทย์หลัก 5] สร้างปุ่มส่งข้อมูลสำหรับส่งแบบฟอร์มสมาชิกทั้งหมดด้วยแท็ก <button type="submit"> -->


    <!-- สิ้นสุดพื้นที่แบบฟอร์ม </form> -->

</body>
</html>
