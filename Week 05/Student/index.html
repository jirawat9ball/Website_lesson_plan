<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Colour Vocab (สมุดคำศัพท์สี)</title>
    <!-- เริ่มต้นด้วยการเชื่อมโยงไฟล์ style.css -->

</head>
<body>
    <div class="container">
        <h1>สมุดคำศัพท์สี (Colour Vocab)</h1>

            <!--
            <div class="card red">

            </div>
            -->
            
            <div class="card red">
                <div class="swatch"></div>
                <div class="label">Red (สีแดง)</div>
            </div>
            <div class="card blue">
                <div class="swatch"></div>
                <div class="label">Blue (สีน้ำเงิน)</div>
