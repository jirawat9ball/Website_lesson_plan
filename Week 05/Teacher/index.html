<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Colour Vocab (Theme Demo)</title>
    <!-- ครูสามารถเปลี่ยนเป็น dark.css เพื่อสาธิตการสลับธีม -->
    <link rel="stylesheet" href="light.css">
</head>
<body>
    <div class="container">
        <h1>สมุดคำศัพท์สี (Colour Vocab)</h1>
        <p>ลองสลับธีมโดยการเปลี่ยนชื่อไฟล์ CSS ในโค้ด (สลับระหว่าง light.css และ dark.css)</p>
        
        <div class="grid">
            <div class="card red">
                <div class="swatch"></div>
                <div class="label">Red (สีแดง)</div>
            </div>
            <div class="card blue">
                <div class="swatch"></div>
                <div class="label">Blue (สีน้ำเงิน)</div>
            </div>
            <div class="card green">
                <div class="swatch"></div>
                <div class="label">Green (สีเขียว)</div>
            </div>
            <div class="card yellow">
                <div class="swatch"></div>
                <div class="label">Yellow (สีเหลือง)</div>
            </div>
            <div class="card purple">
                <div class="swatch"></div>
                <div class="label">Purple (สีม่วง)</div>
            </div>
            <div class="card orange">
                <div class="swatch"></div>
                <div class="label">Orange (สีส้ม)</div>
            </div>
        </div>
    </div>
</body>
</html>
